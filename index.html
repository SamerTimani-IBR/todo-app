<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#6366f1" />
    <title>TodoApp</title>
    <!-- Warm up the TLS connection to Supabase before any fetch runs. -->
    <link rel="preconnect" href="https://dqzuuqltbalqvqzrrzcu.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://dqzuuqltbalqvqzrrzcu.supabase.co" />
    <script>
      // Set theme before paint to avoid flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('todoapp.theme');
          var theme = (stored === 'light' || stored === 'dark')
            ? stored
            : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
